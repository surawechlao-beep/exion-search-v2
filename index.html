<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Exion">
<meta name="theme-color" content="#231F20">
<title>Exion Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#B7081D;
  --red2:#8f0616;
  --red-light:rgba(183,8,29,0.08);
  --dark:#231F20;
  --dark2:#1a1718;
  --bg:#F5F5F5;
  --surface:#ffffff;
  --border:#E8E8E8;
  --border2:#D8D8D8;
  --text:#231F20;
  --text2:#3a3535;
  --text3:#7a7070;
  --text4:#b0a8a8;
  --green:#1a7a4a;
  --green-bg:rgba(26,122,74,0.1);
  --amber:#c45c00;
  --amber-bg:rgba(196,92,0,0.1);
  --sans:"Kanit",sans-serif;
  --r:8px;--r2:12px;
  --shadow:0 1px 4px rgba(35,31,32,0.08),0 4px 16px rgba(35,31,32,0.06);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html{-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;padding-bottom:calc(68px + var(--sb));-webkit-font-smoothing:antialiased;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.4s;}
#loading.hide{opacity:0;pointer-events:none;}
.ld-logo{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ld-logomark{font-family:Georgia,serif;font-size:42px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.ld-logomark span{color:var(--red);}
.ld-sub-brand{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:300;}
.ld-divider{width:40px;height:2px;background:var(--red);}
.ld-track{width:160px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:var(--red);border-radius:2px;width:0;transition:width 0.5s ease;}
.ld-status{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:0.06em;font-weight:300;}

/* Header */
.hdr{background:#ffffff;position:sticky;top:0;z-index:100;padding-top:var(--st);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(35,31,32,0.06);}
.hdr-bar{height:3px;background:var(--red);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1;}
.brand-logo span{color:var(--red);}
.brand-th{color:var(--text3);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:300;margin-top:1px;}
.sync-btn{display:flex;align-items:center;gap:5px;background:#f4f4f4;border:1px solid var(--border2);color:var(--text3);font-family:var(--sans);font-size:10px;font-weight:500;padding:6px 12px;border-radius:4px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.sync-btn.spin svg{animation:rot 0.8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* Search */
.search-wrap{padding:12px 18px 0;}
.search-field{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:9px 13px;transition:border-color 0.2s;}
.search-field:focus-within{border-color:var(--red);background:#fff;}
.search-field svg{flex-shrink:0;color:var(--text4);}
.search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;font-weight:400;}
.search-input::placeholder{color:var(--text4);}
.x-btn{display:none;background:var(--border);border:none;color:var(--text3);border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
.x-btn.show{display:flex;}

/* Tabs */
.tabs{display:flex;padding:10px 18px 0;gap:0;}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 8px 11px;border:none;background:transparent;font-family:var(--sans);font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;letter-spacing:0.06em;text-transform:uppercase;}
.tab.on{color:var(--red);border-bottom-color:var(--red);}
.tab-n{font-size:9px;background:var(--border);padding:2px 6px;border-radius:4px;font-family:var(--sans);color:var(--text3);}
.tab.on .tab-n{background:var(--red);color:#fff;}

/* Filter bar */
.filter-bar{padding:8px 18px 6px;overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);font-family:var(--sans);font-size:11px;font-weight:400;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:0.02em;}
.chip.on{background:var(--red-light);border-color:var(--red);color:var(--red);}
.chip svg{width:10px;height:10px;}

/* Content */
.content{padding:14px 18px;}

/* KPIs */
.kpis{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.kpis::-webkit-scrollbar{display:none;}
.kpi{background:var(--surface);border-radius:var(--r);padding:10px 14px;flex-shrink:0;min-width:90px;border:1px solid var(--border);border-left:3px solid var(--red);box-shadow:var(--shadow);}
.kpi-v{font-size:20px;font-weight:600;color:var(--text);line-height:1;font-family:var(--sans);}
.kpi-l{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;font-weight:400;}

/* Info */
.info{font-size:11px;color:var(--text3);margin-bottom:10px;letter-spacing:0.01em;}
.info strong{color:var(--text2);font-weight:600;}

/* Card */
.card{background:var(--surface);border-radius:var(--r2);margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden;transition:box-shadow 0.15s,transform 0.12s;}
.card:active{transform:scale(0.988);box-shadow:none;}
.card-accent{height:3px;background:var(--red);}
.card-top{padding:13px 14px 10px;}
.card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:4px;}
.card-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;font-weight:400;}
.dot{color:var(--border2);}
.card-rows{padding:4px 14px 10px;background:#fff;border-top:1px solid var(--border);}
.cr{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;border-radius:6px;margin:2px 0;}
.cr:nth-child(odd){background:#f8f8f8;}
.cr:nth-child(even){background:#fff;}
.cl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;margin-right:8px;}
.cv{font-size:13px;color:var(--text);text-align:right;max-width:55vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.cv.s{font-family:var(--sans);}

/* Badge */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.bdg::before{content:"";width:4px;height:4px;border-radius:50%;background:currentColor;}
.b-ok{background:var(--green-bg);color:var(--green);}
.b-late{background:var(--amber-bg);color:var(--amber);}
.b-other{background:var(--red-light);color:var(--red);}

mark{background:#ffe082;color:inherit;border-radius:2px;padding:0 1px;}

/* Empty */
.empty{text-align:center;padding:56px 20px;}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.25;}
.empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.empty p{font-size:12px;color:var(--text3);font-weight:300;}

/* Load more */
.lm{text-align:center;padding:4px 0 12px;}
.lm-btn{background:var(--surface);border:1px solid var(--border2);color:var(--red);font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 24px;border-radius:var(--r);cursor:pointer;box-shadow:var(--shadow);letter-spacing:0.02em;}
.lm-info{font-size:10px;color:var(--text4);margin-top:5px;letter-spacing:0.03em;}
.sync-time{text-align:center;font-size:10px;color:var(--text4);padding:6px 0 2px;letter-spacing:0.04em;}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:2px solid var(--red);padding:6px 0 calc(6px + var(--sb));display:flex;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;cursor:pointer;border:none;background:transparent;-webkit-tap-highlight-color:transparent;}
.nb svg{color:var(--text4);transition:transform 0.12s;}
.nb:active svg{transform:scale(0.85);}
.nb-l{font-size:8px;font-weight:600;color:var(--text4);letter-spacing:0.08em;text-transform:uppercase;}
.nb.on svg{color:var(--red);}
.nb.on .nb-l{color:var(--red);}

/* Modal */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(35,31,32,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;}
.overlay.show{display:flex;animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;animation:su 0.3s cubic-bezier(0.32,0.72,0,1);padding-bottom:calc(20px + var(--sb));}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-top-bar{height:3px;background:var(--red);}
.m-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.m-hdr{padding:12px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.m-title{font-size:15px;font-weight:600;color:var(--text);flex:1;line-height:1.35;}
.m-close{background:var(--bg);border:1px solid var(--border);border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;flex-shrink:0;}
.m-body{padding:14px 18px;}
.m-sec{margin-bottom:18px;}
.m-sec-t{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.m-sec-t::after{content:"";flex:1;height:1px;background:var(--border);}
.m-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 10px;border-radius:6px;margin:2px 0;}
.m-row:nth-child(odd){background:#f8f8f8;}
.m-row:nth-child(even){background:#fff;}
.m-row:last-child{border:none;}
.m-lbl{font-size:12px;color:var(--text3);flex-shrink:0;margin-right:12px;font-weight:400;}
.m-val{font-size:13px;color:var(--text);text-align:right;word-break:break-all;max-width:58%;font-weight:600;}
.m-val.t{font-family:var(--sans);}

/* Filter sheet */
.fo{position:fixed;inset:0;z-index:400;background:rgba(35,31,32,0.6);display:none;align-items:flex-end;}
.fo.show{display:flex;animation:fi 0.2s ease;}
.fs{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:72vh;overflow-y:auto;animation:su 0.3s cubic-bezier(0.32,0.72,0,1);padding-bottom:calc(16px + var(--sb));}
.fs-top{height:3px;background:var(--red);}
.fs-hdr{padding:10px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fs-title{font-size:15px;font-weight:600;}
.fs-body{padding:16px 18px;}
.fs-sec{margin-bottom:18px;}
.fs-sec-t{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.fchips{display:flex;flex-wrap:wrap;gap:6px;}
.fchip{padding:6px 14px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);font-family:var(--sans);font-size:12px;color:var(--text2);cursor:pointer;font-weight:400;}
.fchip.on{background:var(--red-light);border-color:var(--red);color:var(--red);font-weight:600;}
.f-act{display:flex;gap:10px;padding:0 18px 4px;}
.f-clr{flex:1;padding:11px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;font-family:var(--sans);font-size:13px;color:var(--text3);cursor:pointer;}
.f-apply{flex:2;padding:11px;border-radius:var(--r);border:none;background:var(--red);color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>

      <input class="search-input" id="searchInput" type="search" placeholder="ค้นหา บริษัท, PO, Model, S/N ..." autocomplete="off" spellcheck="false">
      <button class="x-btn" id="xBtn" onclick="clearSearch()">&#x2715;</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-db" onclick="switchTab('db')">Products <span class="tab-n" id="cnt-db">0</span></button>
    <button class="tab" id="tab-po" onclick="switchTab('po')">PO Orders <span class="tab-n" id="cnt-po">0</span></button>
  </div>
</header>

<div class="filter-bar" id="filterBar"></div>

<div class="content">
  <div class="kpis" id="kpis"></div>
  <div class="info" id="info"></div>
  <div id="list"></div>
  <div class="lm" id="lmWrap" style="display:none">
    <button class="lm-btn" onclick="loadMore()">โหลดเพิ่มเติม</button>
    <div class="lm-info" id="lmInfo"></div>
  </div>
  <div class="sync-time" id="syncTime"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-top-bar"></div>
    <div class="m-handle"></div>
    <div class="m-hdr"><div class="m-title" id="mTitle"></div><button class="m-close" onclick="closeModal()">&#x2715;</button></div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<div class="fo" id="fo" onclick="if(event.target===this)closeFO()">
  <div class="fs">
    <div class="fs-top"></div>
    <div class="fs-hdr"><div class="fs-title">กรองข้อมูล</div><button class="m-close" onclick="closeFO()">&#x2715;</button></div>
    <div class="fs-body" id="fsBody"></div>
    <div class="f-act">
      <button class="f-clr" onclick="clearFO()">ล้างทั้งหมด</button>
      <button class="f-apply" onclick="applyFO()">แสดงผลลัพธ์</button>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nb on" id="nav-db" onclick="switchTab('db')">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <span class="nb-l">Products</span>
  </button>
  <button class="nb" id="nav-po" onclick="switchTab('po')">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span class="nb-l">PO Orders</span>
  </button>
</nav>

<script>
const API="https://script.google.com/macros/s/AKfycbyrPCEB7PMhSoShVmpfTL3V6i2DQ3w6dAqxmKjXTqy44iJG5C1cVdvDIwLSCRhgCNOs/exec";
const YEARS=["2020","2021","2022","2023","2024","2025","2026"];
let DB=[],PO=[],tab="db",shown=30;
const BATCH=30;
let fDB=[],fPO=[],q="";
let fil={status:[],year:[]},pFil={status:[],year:[]};

async function gsheet(name){
  const r=await fetch(API+"?sheet="+encodeURIComponent(name));
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function prog(p,msg){
  document.getElementById("ldFill").style.width=p+"%";
  document.getElementById("ldStatus").textContent=msg;
}
async function loadAll(){
  document.getElementById("syncBtn").classList.add("spin");
  prog(5,"Loading Database...");
  try{
    DB=(await gsheet("Database")).filter(r=>r["Company"]||r["Product"]);
    prog(18,"Database loaded");
    const res=await Promise.allSettled(YEARS.map((y,i)=>gsheet(y).then(rows=>{prog(18+((i+1)/YEARS.length*76),"Loading PO "+y+"...");return rows.map(r=>({...r,Year:y}));})));
    PO=[];
    res.forEach(r=>{if(r.status==="fulfilled")PO.push(...r.value.filter(x=>x["Customer"]||x["PO No."]||x["\u0e1b"]));});
    PO=PO.map(r=>{if(r["\u0e1b"]&&!r["PO No."]){r["PO No."]=r["\u0e1b"];delete r["\u0e1b"];}return r;});
    prog(100,"Complete");
    const now=new Date().toLocaleString("th-TH");
    localStorage.setItem("ex_db",JSON.stringify(DB));
    localStorage.setItem("ex_po",JSON.stringify(PO));
    localStorage.setItem("ex_up",now);
    document.getElementById("syncTime").textContent="อัปเดตล่าสุด: "+now;
    setTimeout(hideLd,500);
    doSearch();
  }catch(e){
    console.error(e);
    fromCache("Sync failed: "+e.message);
  }
  document.getElementById("syncBtn").classList.remove("spin");
}
function fromCache(msg){
  try{
    const d=localStorage.getItem("ex_db"),p=localStorage.getItem("ex_po"),u=localStorage.getItem("ex_up");
    if(d)DB=JSON.parse(d);if(p)PO=JSON.parse(p);
    if(u)document.getElementById("syncTime").textContent="Cache: "+u;
    hideLd();doSearch();
    if(msg)toast(msg);
  }catch(e){document.getElementById("ldStatus").textContent="ไม่พบ cache — กรุณาเชื่อมต่ออินเทอร์เน็ต";}
}
function hideLd(){const el=document.getElementById("loading");el.classList.add("hide");setTimeout(()=>el.style.display="none",400);}
function toast(msg){
  let t=document.getElementById("_t");
  if(!t){t=document.createElement("div");t.id="_t";t.style.cssText="position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:8px 16px;border-radius:6px;font-size:11px;z-index:600;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;border-left:3px solid var(--red);";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._);t._=setTimeout(()=>t.style.opacity="0",3500);
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function low(s){return String(s||"").toLowerCase();}
function matchQ(row,q){if(!q)return true;const c=Object.values(row).join("|").toLowerCase();return q.split(" ").filter(Boolean).every(t=>c.includes(t));}
function applyFil(data){let d=[...data];if(tab==="po"){if(fil.status.length)d=d.filter(r=>fil.status.some(s=>low(r["Status"]).includes(low(s))));if(fil.year.length)d=d.filter(r=>fil.year.includes(r["Year"]));}return d;}
function doSearch(){
  q=low(document.getElementById("searchInput").value.trim());
  document.getElementById("xBtn").classList.toggle("show",!!q);
  fDB=DB.filter(r=>matchQ(r,q));
  fPO=applyFil(PO.filter(r=>matchQ(r,q)));
  shown=BATCH;
  document.getElementById("cnt-db").textContent=fDB.length.toLocaleString();
  document.getElementById("cnt-po").textContent=fPO.length.toLocaleString();
  renderBar();render();
}
function clearSearch(){document.getElementById("searchInput").value="";doSearch();}
function switchTab(t){
  tab=t;shown=BATCH;
  ["db","po"].forEach(x=>{document.getElementById("tab-"+x).classList.toggle("on",x===t);document.getElementById("nav-"+x).classList.toggle("on",x===t);});
  renderBar();render();window.scrollTo({top:0,behavior:"smooth"});
}
function renderBar(){
  const bar=document.getElementById("filterBar");
  if(tab==="db"){bar.innerHTML="";bar.style.display="none";return;}
  bar.style.display="flex";
  const act=fil.status.length+fil.year.length;
  bar.innerHTML=`<button class="chip ${act?"on":""}" onclick="openFO()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Filter${act?" ("+act+")":""}</button>`
    +fil.status.map(s=>`<span class="chip on" onclick="rmFil('status','${s}')">${s} &#x2715;</span>`).join("")
    +fil.year.map(y=>`<span class="chip on" onclick="rmFil('year','${y}')">${y} &#x2715;</span>`).join("");
}
function rmFil(type,val){fil[type]=fil[type].filter(v=>v!==val);doSearch();}
function openFO(){
  pFil={status:[...fil.status],year:[...fil.year]};
  document.getElementById("fsBody").innerHTML=
    `<div class="fs-sec"><div class="fs-sec-t">Status</div><div class="fchips">${["Shipped","Ship Late"].map(s=>`<button class="fchip ${pFil.status.includes(s)?"on":""}" onclick="togFil('status','${s}',this)">${s}</button>`).join("")}</div></div>`+
    `<div class="fs-sec"><div class="fs-sec-t">ปี</div><div class="fchips">${YEARS.map(y=>`<button class="fchip ${pFil.year.includes(y)?"on":""}" onclick="togFil('year','${y}',this)">${y}</button>`).join("")}</div></div>`;
  document.getElementById("fo").classList.add("show");document.body.style.overflow="hidden";
}
function togFil(type,val,el){const i=pFil[type].indexOf(val);if(i>-1){pFil[type].splice(i,1);el.classList.remove("on");}else{pFil[type].push(val);el.classList.add("on");}}
function applyFO(){fil={...pFil};closeFO();doSearch();}
function clearFO(){pFil={status:[],year:[]};document.querySelectorAll(".fchip").forEach(c=>c.classList.remove("on"));}
function closeFO(){document.getElementById("fo").classList.remove("show");document.body.style.overflow="";}
function hl(text,q){
  if(!q||!text)return esc(text);
  let r=esc(String(text));
  q.split(" ").filter(Boolean).forEach(t=>{
    const lo=r.toLowerCase();let out="",i=0;
    while(i<r.length){const j=lo.indexOf(t,i);if(j<0){out+=r.slice(i);break;}out+=r.slice(i,j)+"<mark>"+r.slice(j,j+t.length)+"</mark>";i=j+t.length;}
    r=out;
  });
  return r;
}
function bc(s){const n=low(s);return n.includes("ship")&&!n.includes("late")?"b-ok":n.includes("late")?"b-late":"b-other";}
function render(){
  const data=tab==="db"?fDB:fPO;
  const total=data.length,slice=data.slice(0,shown);
  const kp=document.getElementById("kpis");
  if(tab==="db"){
    const co=[...new Set(data.map(r=>r["Company"]).filter(Boolean))].length;
    const pr=[...new Set(data.map(r=>r["Product"]).filter(Boolean))].length;
    kp.innerHTML=mkK(total,"รายการ")+mkK(co,"บริษัท")+mkK(pr,"สินค้า");
  }else{
    const ok=data.filter(r=>{const n=low(r["Status"]);return n.includes("ship")&&!n.includes("late");}).length;
    const lt=data.filter(r=>low(r["Status"]).includes("late")).length;
    kp.innerHTML=mkK(total,"PO ทั้งหมด")+mkKc(ok,"Shipped","var(--green)")+mkKc(lt,"Ship Late","var(--amber)");
  }
  document.getElementById("info").innerHTML=q?`พบ <strong>${total.toLocaleString()}</strong> รายการ &nbsp;·&nbsp; "<strong>${esc(q)}</strong>"`:`ทั้งหมด <strong>${total.toLocaleString()}</strong> รายการ`;
  const list=document.getElementById("list");
  if(!total){list.innerHTML=`<div class="empty"><div class="empty-icon">&#128269;</div><h3>ไม่พบข้อมูล</h3><p>ลองค้นหาด้วยคำอื่น</p></div>`;document.getElementById("lmWrap").style.display="none";return;}
  list.innerHTML=tab==="db"?rnDB(slice):rnPO(slice);
  const lm=document.getElementById("lmWrap");
  if(shown<total){lm.style.display="block";document.getElementById("lmInfo").textContent=Math.min(shown,total).toLocaleString()+" / "+total.toLocaleString()+" รายการ";}
  else lm.style.display="none";
}
function mkK(v,l){return `<div class="kpi"><div class="kpi-v">${Number(v).toLocaleString()}</div><div class="kpi-l">${l}</div></div>`;}
function mkKc(v,l,c){return `<div class="kpi" style="border-left-color:${c}"><div class="kpi-v" style="color:${c}">${Number(v).toLocaleString()}</div><div class="kpi-l">${l}</div></div>`;}
function rnDB(rows){
  return rows.map((r,i)=>`<div class="card" onclick="opDB(${i})"><div class="card-accent"></div><div class="card-top"><div class="card-name">${hl(r["Company"],q)||"—"}</div><div class="card-meta"><span>${hl(r["Product"],q)||""}</span>${r["Detail"]?`<span class="dot">·</span><span>${hl(r["Detail"],q)}</span>`:""}</div></div><div class="card-rows">${r["Exion P.O."]?cr("Exion PO",hl(r["Exion P.O."],q)):""}${r["Cust. Ref. PO."]?cr("Cust. PO",hl(r["Cust. Ref. PO."],q)):""}${r["MODEL"]?cr("Model",hl(r["MODEL"],q)):""}${r["S/N"]?cr("S/N",hl(r["S/N"],q)):""}</div></div>`).join("");
}
function rnPO(rows){
  return rows.map((r,i)=>{const s=r["Status"]||"";return `<div class="card" onclick="opPO(${i})"><div class="card-accent"></div><div class="card-top"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div class="card-name" style="flex:1">${hl(r["Customer"],q)||"—"}</div>${s?`<span class="bdg ${bc(s)}">${esc(s)}</span>`:""}</div><div class="card-meta"><span>${hl(r["Supplier"],q)||"—"}</span><span class="dot">·</span><span style="color:var(--red);font-weight:600">${r["Year"]||""}</span></div></div><div class="card-rows">${r["PO No."]?cr("PO No.",hl(r["PO No."],q)):""}${r["Customer PO"]?cr("Customer PO",hl(r["Customer PO"],q)):""}${r["Customer Due"]?cr("Due Date",hl(r["Customer Due"],q)):""}${r["Sales"]?crs("Sales",hl(r["Sales"],q)):""}</div></div>`;}).join("");
}
function cr(l,v){return `<div class="cr"><span class="cl">${l}</span><span class="cv">${v}</span></div>`;}
function crs(l,v){return `<div class="cr"><span class="cl">${l}</span><span class="cv s">${v}</span></div>`;}
function loadMore(){shown+=BATCH;render();}
function opDB(i){
  const r=fDB[i];if(!r)return;
  document.getElementById("mTitle").textContent=r["Company"]||"Product Detail";
  const fields=[["Product","Product",true],["Detail","Detail",true],["Model","MODEL",false],["S/N","S/N",false],["QTY","QTY",false],["COO","COO",false],["Exion P.O.","Exion P.O.",false],["Cust. Ref. PO.","Cust. Ref. PO.",false],["Cost (USD/EA)","Cost (Our PO)/ EA (USD)",false],["Sales (Baht/EA)","Sales amount (Baht) / EA",false],["Ship From","SHIP FROM FACTORY",true],["Deliver To","DELIVER TO CUSTOMER",true],["Warranty","WARANTY",true],["Service","SERVICE",true],["End User","END USER",true],["Location","LOCATION",true],["Contact","CONTACT",true]];
  const rows=fields.filter(([,k])=>r[k]&&String(r[k]).trim()).map(([l,k,t])=>`<div class="m-row"><span class="m-lbl">${l}</span><span class="m-val${t?" t":""}">${esc(r[k])}</span></div>`).join("");
  document.getElementById("mBody").innerHTML=`<div class="m-sec"><div class="m-sec-t">ข้อมูลสินค้า</div>${rows||"<p style='color:var(--text4);font-size:12px'>ไม่มีข้อมูลเพิ่มเติม</p>"}</div>`;
  document.getElementById("overlay").classList.add("show");document.body.style.overflow="hidden";
}
function opPO(i){
  const r=fPO[i];if(!r)return;
  const s=r["Status"]||"";
  document.getElementById("mTitle").textContent=r["Customer"]||"PO Detail";
  const fields=[["PO No.","PO No."],["ปี","Year"],["Supplier","Supplier"],["Customer","Customer"],["Customer PO","Customer PO"],["Job No.","Job"],["Sales","Sales"],["Code","Code"],["Freight","Freight"],["Actual Cost","Actual"],["Weight","Weight"],["Customer Due","Customer Due"],["Factory Due","Factory Due "],["Actual Ship","Actual "],["Remark","Remark"]];
  const rows=fields.filter(([,k])=>r[k]&&String(r[k]).trim()).map(([l,k])=>`<div class="m-row"><span class="m-lbl">${l}</span><span class="m-val">${esc(r[k])}</span></div>`).join("");
  document.getElementById("mBody").innerHTML=`<div class="m-sec"><div class="m-sec-t">สถานะ</div>${s?`<span class="bdg ${bc(s)}">${esc(s)}</span>`:"<span style='color:var(--text4);font-size:12px'>ไม่ระบุ</span>"}</div><div class="m-sec"><div class="m-sec-t">รายละเอียด PO</div>${rows}</div>`;
  document.getElementById("overlay").classList.add("show");document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("overlay").classList.remove("show");document.body.style.overflow="";}
let deb;
document.getElementById("searchInput").addEventListener("input",()=>{clearTimeout(deb);deb=setTimeout(doSearch,180);});
const cc=localStorage.getItem("ex_db");
if(cc){try{DB=JSON.parse(cc);PO=JSON.parse(localStorage.getItem("ex_po")||"[]");const u=localStorage.getItem("ex_up");if(u)document.getElementById("syncTime").textContent="Cache: "+u;hideLd();doSearch();}catch(e){}}
loadAll();
</script>
</body>
</html>

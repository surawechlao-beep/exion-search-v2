<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Exion">
<meta name="theme-color" content="#231F20" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f0d0e" media="(prefers-color-scheme: dark)">
<title>Exion Thailand</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Exion Thailand","short_name":"Exion","start_url":".","display":"standalone","background_color":"%23231F20","theme_color":"%23B7081D","icons":[{"src":"data:image/svg+xml;utf8,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 fill=%27%23231F20%27/%3E%3Ctext x=%2796%27 y=%27120%27 font-family=%27Georgia,serif%27 font-size=%2790%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27white%27%3EE%3Ctspan fill=%27%23B7081D%27%3Ex%3C/tspan%3E%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --red:#B7081D;
  --red2:#8f0616;
  --red-light:rgba(183,8,29,0.08);
  --dark:#231F20;
  --dark2:#1a1718;
  --bg:#F5F5F5;
  --surface:#ffffff;
  --surface2:#fafafa;
  --border:#E8E8E8;
  --border2:#D8D8D8;
  --text:#231F20;
  --text2:#3a3535;
  --text3:#7a7070;
  --text4:#b0a8a8;
  --green:#1a7a4a;
  --green-bg:rgba(26,122,74,0.1);
  --amber:#c45c00;
  --amber-bg:rgba(196,92,0,0.1);
  --blue:#0b5394;
  --blue-bg:rgba(11,83,148,0.08);
  --sans:"Kanit",sans-serif;
  --r:8px;--r2:12px;
  --shadow:0 1px 4px rgba(35,31,32,0.08),0 4px 16px rgba(35,31,32,0.06);
  --shadow-lg:0 4px 12px rgba(35,31,32,0.1),0 12px 32px rgba(35,31,32,0.08);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}

/* Dark mode */
@media (prefers-color-scheme: dark){
  :root.auto-theme{
    --bg:#0f0d0e;
    --surface:#1a1718;
    --surface2:#221e1f;
    --border:#2a2526;
    --border2:#3a3334;
    --text:#f0ebec;
    --text2:#d5cece;
    --text3:#8a8080;
    --text4:#605a5b;
    --red-light:rgba(183,8,29,0.18);
    --green-bg:rgba(26,122,74,0.22);
    --amber-bg:rgba(196,92,0,0.22);
    --blue-bg:rgba(11,83,148,0.22);
    --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
    --shadow-lg:0 4px 12px rgba(0,0,0,0.4),0 12px 32px rgba(0,0,0,0.3);
  }
}
:root.dark{
  --bg:#0f0d0e;--surface:#1a1718;--surface2:#221e1f;
  --border:#2a2526;--border2:#3a3334;
  --text:#f0ebec;--text2:#d5cece;--text3:#8a8080;--text4:#605a5b;
  --red-light:rgba(183,8,29,0.18);
  --green-bg:rgba(26,122,74,0.22);
  --amber-bg:rgba(196,92,0,0.22);
  --blue-bg:rgba(11,83,148,0.22);
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.4),0 12px 32px rgba(0,0,0,0.3);
}

html{-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;padding-bottom:calc(68px + var(--sb));-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ═══════════════════════ Login Screen ═══════════════════════ */
#loginScreen{position:fixed;inset:0;background:var(--dark);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#loginScreen.show{display:flex;}
.lg-logo{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:36px;}
.lg-logomark{font-family:Georgia,serif;font-size:46px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.lg-logomark span{color:var(--red);}
.lg-sub{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:300;}
.lg-div{width:40px;height:2px;background:var(--red);margin-top:4px;}
.lg-card{width:100%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:24px;}
.lg-label{display:block;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;font-weight:500;}
.lg-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:12px 14px;font-family:var(--sans);font-size:15px;color:#fff;outline:none;transition:border-color 0.2s;}
.lg-input:focus{border-color:var(--red);}
.lg-btn{width:100%;background:var(--red);border:none;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;padding:12px;border-radius:6px;cursor:pointer;margin-top:14px;letter-spacing:0.04em;text-transform:uppercase;transition:background 0.15s;}
.lg-btn:hover{background:var(--red2);}
.lg-btn:disabled{opacity:0.5;cursor:not-allowed;}
.lg-err{color:#ff6b6b;font-size:12px;margin-top:12px;text-align:center;display:none;}
.lg-err.show{display:block;}
.lg-foot{margin-top:24px;color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:0.06em;text-align:center;}

/* ═══════════════════════ Loading ═══════════════════════ */
#loading{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.4s;}
#loading.hide{opacity:0;pointer-events:none;}
.ld-logo{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ld-logomark{font-family:Georgia,serif;font-size:42px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;}
.ld-logomark span{color:var(--red);}
.ld-sub-brand{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:300;}
.ld-divider{width:40px;height:2px;background:var(--red);}
.ld-track{width:160px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:var(--red);border-radius:2px;width:0;transition:width 0.5s ease;}
.ld-status{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:0.06em;font-weight:300;}

/* ═══════════════════════ Header ═══════════════════════ */
.hdr{background:var(--surface);position:sticky;top:0;z-index:100;padding-top:var(--st);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(35,31,32,0.06);}
.hdr-bar{height:3px;background:var(--red);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0;gap:8px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1;}
.brand-logo span{color:var(--red);}
.brand-th{color:var(--text3);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:300;margin-top:1px;}
.hdr-actions{display:flex;gap:6px;align-items:center;}
.icon-btn{display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);width:30px;height:28px;border-radius:4px;cursor:pointer;padding:0;transition:background 0.15s;}
.icon-btn:hover{background:var(--border);}
.icon-btn.on{background:var(--red-light);border-color:var(--red);color:var(--red);}
.sync-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);font-family:var(--sans);font-size:10px;font-weight:500;padding:6px 12px;border-radius:4px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}
.sync-btn.spin svg{animation:rot 0.8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* Offline banner */
.offline-banner{display:none;background:var(--amber-bg);color:var(--amber);font-size:11px;font-weight:500;padding:6px 18px;text-align:center;border-bottom:1px solid var(--border);letter-spacing:0.02em;}
.offline-banner.show{display:block;}
.offline-banner::before{content:"●";margin-right:6px;}

/* Pull-to-refresh */
#ptr{position:absolute;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.2s;margin-top:calc(var(--st) + 3px);}
#ptr.show{opacity:1;}
.ptr-spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:rot 0.8s linear infinite;}

/* Search */
.search-wrap{padding:12px 18px 0;}
.search-field{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:9px 13px;transition:border-color 0.2s;}
.search-field:focus-within{border-color:var(--red);background:var(--surface);}
.search-field svg{flex-shrink:0;color:var(--text4);}
.search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;font-weight:400;min-width:0;}
.search-input::placeholder{color:var(--text4);}
.x-btn{display:none;background:var(--border);border:none;color:var(--text3);border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
.x-btn.show{display:flex;}

/* Tabs */
.tabs{display:flex;padding:10px 8px 0;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px 11px;border:none;background:transparent;font-family:var(--sans);font-size:10px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;}
.tab.on{color:var(--red);border-bottom-color:var(--red);}
.tab-n{font-size:9px;background:var(--border);padding:2px 5px;border-radius:4px;font-family:var(--sans);color:var(--text3);}
.tab.on .tab-n{background:var(--red);color:#fff;}

/* Filter bar */
.filter-bar{padding:8px 18px 6px;overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:nowrap;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);font-family:var(--sans);font-size:11px;font-weight:400;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:0.02em;}
.chip.on{background:var(--red-light);border-color:var(--red);color:var(--red);}
.chip.sort-chip{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.chip svg{width:10px;height:10px;}

/* Content */
.content{padding:14px 18px;}

/* KPIs */
.kpis{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.kpis::-webkit-scrollbar{display:none;}
.kpi{background:var(--surface);border-radius:var(--r);padding:10px 14px;flex-shrink:0;min-width:90px;border:1px solid var(--border);border-left:3px solid var(--red);box-shadow:var(--shadow);}
.kpi-v{font-size:20px;font-weight:600;color:var(--text);line-height:1;font-family:var(--sans);}
.kpi-l{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;font-weight:400;}

/* Info */
.info{font-size:11px;color:var(--text3);margin-bottom:10px;letter-spacing:0.01em;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.info strong{color:var(--text2);font-weight:600;}
.export-link{color:var(--red);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:0.02em;display:flex;align-items:center;gap:4px;background:none;border:none;font-family:var(--sans);padding:0;}
.export-link:hover{text-decoration:underline;}

/* Card */
.card{background:var(--surface);border-radius:var(--r2);margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;overflow:hidden;transition:box-shadow 0.15s,transform 0.12s;}
.card:active{transform:scale(0.988);box-shadow:none;}
.card-accent{height:3px;background:var(--red);}
.card-top{padding:13px 14px 10px;}
.card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:4px;}
.card-name .quick-link{color:var(--red);cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s;}
.card-name .quick-link:hover{text-decoration-color:var(--red);}
.card-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;font-weight:400;flex-wrap:wrap;}
.dot{color:var(--border2);}
.card-rows{padding:4px 14px 10px;background:var(--surface);border-top:1px solid var(--border);}
.cr{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;border-radius:6px;margin:2px 0;}
.cr:nth-child(odd){background:var(--surface2);}
.cr:nth-child(even){background:var(--surface);}
.cl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;margin-right:8px;}
.cv{font-size:13px;color:var(--text);text-align:right;max-width:55vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.cv.s{font-family:var(--sans);}

/* Badge */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;}
.bdg::before{content:"";width:4px;height:4px;border-radius:50%;background:currentColor;}
.b-ok{background:var(--green-bg);color:var(--green);}
.b-late{background:var(--amber-bg);color:var(--amber);}
.b-other{background:var(--red-light);color:var(--red);}
.b-due{background:var(--blue-bg);color:var(--blue);}
.b-overdue{background:var(--red-light);color:var(--red);}
/* Date badge — larger, structured 2-line badge for PO cards */
.bdg-date{display:inline-flex;flex-direction:column;align-items:flex-end;gap:1px;padding:4px 8px;border-radius:4px;font-family:var(--sans);line-height:1.1;white-space:nowrap;border:1px solid transparent;}
.bdg-date.b-due{background:var(--blue-bg);color:var(--blue);border-color:rgba(11,83,148,0.2);}
.bdg-date.b-overdue{background:var(--red-light);color:var(--red);border-color:rgba(183,8,29,0.25);}
.bdg-date.b-late{background:var(--amber-bg);color:var(--amber);border-color:rgba(196,92,0,0.25);}
.bdg-date-top{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85;}
.bdg-date-main{font-size:11px;font-weight:700;letter-spacing:0.02em;}
.bdg-date-sub{font-size:8px;font-weight:600;letter-spacing:0.04em;opacity:0.8;}

/* Product chip (S/N / Model) */
.pchip{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:0.02em;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
.pchip-label{font-size:8px;font-weight:700;color:var(--text4);letter-spacing:0.08em;text-transform:uppercase;}
.pchip-value{color:var(--text2);font-weight:600;}
.pchip-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}

mark{background:#ffe082;color:#231F20;border-radius:2px;padding:0 1px;}

/* Empty */
.empty{text-align:center;padding:56px 20px;}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.25;}
.empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.empty p{font-size:12px;color:var(--text3);font-weight:300;}

/* Load more */
.lm{text-align:center;padding:4px 0 12px;}
.lm-btn{background:var(--surface);border:1px solid var(--border2);color:var(--red);font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 24px;border-radius:var(--r);cursor:pointer;box-shadow:var(--shadow);letter-spacing:0.02em;}
.lm-info{font-size:10px;color:var(--text4);margin-top:5px;letter-spacing:0.03em;}
.sync-time{text-align:center;font-size:10px;color:var(--text4);padding:6px 0 2px;letter-spacing:0.04em;}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:2px solid var(--red);padding:6px 0 calc(6px + var(--sb));display:flex;}
.dark .nav, :root.auto-theme .nav{background:rgba(26,23,24,0.94);}
@media (prefers-color-scheme: dark){.nav{background:rgba(26,23,24,0.94);}}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;cursor:pointer;border:none;background:transparent;-webkit-tap-highlight-color:transparent;}
.nb svg{color:var(--text4);transition:transform 0.12s;}
.nb:active svg{transform:scale(0.85);}
.nb-l{font-size:8px;font-weight:600;color:var(--text4);letter-spacing:0.08em;text-transform:uppercase;}
.nb.on svg{color:var(--red);}
.nb.on .nb-l{color:var(--red);}

/* Modal */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(35,31,32,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;}
.overlay.show{display:flex;animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;animation:su 0.3s cubic-bezier(0.32,0.72,0,1);padding-bottom:calc(20px + var(--sb));}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-top-bar{height:3px;background:var(--red);}
.m-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.m-hdr{padding:12px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.m-title{font-size:15px;font-weight:600;color:var(--text);flex:1;line-height:1.35;}
.m-close{background:var(--bg);border:1px solid var(--border);border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;flex-shrink:0;}
.m-body{padding:14px 18px;}
.m-sec{margin-bottom:18px;}
.m-sec-t{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.m-sec-t::after{content:"";flex:1;height:1px;background:var(--border);}
.m-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 10px;border-radius:6px;margin:2px 0;}
.m-row:nth-child(odd){background:var(--surface2);}
.m-row:nth-child(even){background:var(--surface);}
.m-row:last-child{border:none;}
.m-lbl{font-size:12px;color:var(--text3);flex-shrink:0;margin-right:12px;font-weight:400;}
.m-val{font-size:13px;color:var(--text);text-align:right;word-break:break-word;max-width:58%;font-weight:600;}
.m-val.t{font-family:var(--sans);}

/* Filter sheet */
.fo{position:fixed;inset:0;z-index:400;background:rgba(35,31,32,0.6);display:none;align-items:flex-end;}
.fo.show{display:flex;animation:fi 0.2s ease;}
.fs{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-height:82vh;overflow-y:auto;animation:su 0.3s cubic-bezier(0.32,0.72,0,1);padding-bottom:calc(16px + var(--sb));}
.fs-top{height:3px;background:var(--red);}
.fs-hdr{padding:10px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.fs-title{font-size:15px;font-weight:600;}
.fs-body{padding:16px 18px;}
.fs-sec{margin-bottom:18px;}
.fs-sec-t{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.fchips{display:flex;flex-wrap:wrap;gap:6px;}
.fchip{display:inline-flex;align-items:center;padding:7px 13px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.fchip.on{background:var(--red);border-color:var(--red);color:#fff;}
.fchip.sort{background:var(--surface2);}
.fchip.sort.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.f-act{padding:12px 18px;display:flex;gap:8px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);}
.f-clr{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text3);font-family:var(--sans);font-size:13px;font-weight:500;padding:10px;border-radius:var(--r);cursor:pointer;}
.f-apply{flex:2;background:var(--red);border:none;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;padding:10px;border-radius:var(--r);cursor:pointer;}

/* Dashboard */
.dash{display:none;}
.dash.show{display:block;}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.dash-card.wide{grid-column:span 2;}
.dash-card.accent::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
.dc-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:6px;}
.dc-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;font-family:var(--sans);letter-spacing:-0.02em;}
.dc-val.sm{font-size:18px;}
.dc-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.dc-sub strong{color:var(--green);font-weight:600;}
.dc-sub.neg strong{color:var(--amber);}
.dc-title{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dc-title::after{content:"";flex:1;height:1px;background:var(--border);}

/* Chart (bar) */
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bc-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.bc-lbl{width:60px;color:var(--text3);font-weight:500;flex-shrink:0;font-size:11px;}
.bc-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:18px;overflow:hidden;position:relative;}
.bc-bar{height:100%;background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;color:#fff;font-size:10px;font-weight:600;transition:width 0.6s cubic-bezier(0.2,0.8,0.2,1);}
.bc-val{color:var(--text2);font-weight:600;min-width:36px;text-align:right;font-size:11px;}

/* Top list */
.top-list{display:flex;flex-direction:column;gap:4px;}
.tl-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;background:var(--surface2);font-size:12px;}
.tl-rank{color:var(--red);font-weight:700;font-size:11px;margin-right:10px;width:18px;flex-shrink:0;}
.tl-name{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-val{color:var(--text3);font-weight:600;margin-left:8px;flex-shrink:0;}

/* Due soon list */
.due-item{padding:10px 12px;background:var(--surface2);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--amber);cursor:pointer;}
.due-item.overdue{border-left-color:var(--red);}
.due-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.due-cust{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;}
.due-days{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;}
.due-days.overdue{color:var(--red);}
.due-bot{font-size:11px;color:var(--text3);display:flex;justify-content:space-between;}

/* Toast */
#_t{position:fixed;bottom:calc(78px + var(--sb));left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:8px 16px;border-radius:6px;font-size:11px;z-index:600;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;border-left:3px solid var(--red);opacity:0;transition:opacity 0.25s;pointer-events:none;}
#_t.show{opacity:1;}

/* Settings sheet */
.set-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:8px;background:var(--surface2);margin-bottom:8px;cursor:pointer;border:1px solid var(--border);}
.set-item:hover{background:var(--border);}
.set-icon{display:flex;align-items:center;gap:10px;color:var(--text);font-size:13px;font-weight:500;}
.set-icon svg{color:var(--text3);}
.set-danger{color:var(--red);}
.set-danger svg{color:var(--red);}

/* ═══════════════════════ Home Launcher ═══════════════════════ */
.home{display:none;}
.home.show{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.home-hero{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);color:#fff;border-radius:var(--r2);padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);}
.home-hero::before{content:"";position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,var(--red) 0%,transparent 70%);opacity:0.3;}
.home-hero::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);}
.hh-label{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.15em;text-transform:uppercase;font-weight:500;margin-bottom:4px;position:relative;}
.hh-greeting{font-size:20px;font-weight:600;color:#fff;line-height:1.25;position:relative;margin-bottom:8px;}
.hh-greeting span{color:var(--red);font-weight:700;}
.hh-stats{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);position:relative;}
.hh-stat{flex:1;min-width:0;}
.hh-stat-v{font-size:22px;font-weight:700;color:#fff;line-height:1;font-family:var(--sans);letter-spacing:-0.02em;}
.hh-stat-l{font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;font-weight:500;}
.hh-stat.alert .hh-stat-v{color:var(--red);}

/* Menu grid */
.home-menu{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.menu-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;text-align:left;-webkit-tap-highlight-color:transparent;transition:transform 0.12s,box-shadow 0.15s;box-shadow:var(--shadow);position:relative;overflow:hidden;font-family:var(--sans);}
.menu-tile:active{transform:scale(0.97);}
.menu-tile::before{content:"";position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red);}
.menu-tile.dash-tile::before{background:var(--blue);}
.menu-tile.recent-tile::before{background:var(--amber);}
.menu-tile.export-tile::before{background:var(--green);}
.menu-tile-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--red-light);color:var(--red);flex-shrink:0;}
.menu-tile.dash-tile .menu-tile-icon{background:var(--blue-bg);color:var(--blue);}
.menu-tile.recent-tile .menu-tile-icon{background:var(--amber-bg);color:var(--amber);}
.menu-tile.export-tile .menu-tile-icon{background:var(--green-bg);color:var(--green);}
.menu-tile-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.25;}
.menu-tile-desc{font-size:11px;color:var(--text3);line-height:1.35;font-weight:400;}
.menu-tile-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.05em;}

/* Quick actions row */
.home-quick{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
.home-quick-title{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.home-quick-title::after{content:"";flex:1;height:1px;background:var(--border);}
.home-quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.quick-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 6px;cursor:pointer;color:var(--text2);-webkit-tap-highlight-color:transparent;transition:all 0.12s;font-family:var(--sans);}
.quick-btn:active{transform:scale(0.94);}
.quick-btn:hover{background:var(--border);}
.quick-btn svg{color:var(--text3);}
.quick-btn-l{font-size:10px;font-weight:500;color:var(--text3);text-align:center;line-height:1.1;}

/* Recent card */
.recent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
.recent-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;margin:2px 0;background:var(--surface2);cursor:pointer;}
.recent-item:hover{background:var(--border);}
.recent-name{font-size:12px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;}
.recent-year{font-size:10px;color:var(--red);font-weight:700;flex-shrink:0;}

/* Animations */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s;}
</style>

function initTheme(){
  const saved = localStorage.getItem("ex_theme");
  const root = document.documentElement;
  if(saved === "dark") root.classList.add("dark");
  else if(saved === "light") root.classList.remove("dark");
  else root.classList.add("auto-theme");
}
function toggleTheme(){
  const root = document.documentElement;
  const saved = localStorage.getItem("ex_theme");
  root.classList.remove("auto-theme");
  if(saved === "dark" || (!saved && matchMedia("(prefers-color-scheme: dark)").matches)){
    root.classList.remove("dark");
    localStorage.setItem("ex_theme","light");
    toast("Light mode");
  } else {
    root.classList.add("dark");
    localStorage.setItem("ex_theme","dark");
    toast("Dark mode");
  }
}

// Auth — token-based (backend จะตรวจ password แล้วคืน token)
// ═══════════════════════════════════════════════════════════════
async function doLogin(){
  const pw = document.getElementById("pwInput").value;
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("loginErr");
  const card = document.querySelector(".lg-card");
  err.classList.remove("show");
  if(!pw){ err.textContent="กรุณากรอกรหัสผ่าน"; err.classList.add("show"); return; }
  btn.disabled = true; btn.textContent = "กำลังตรวจสอบ...";
  try {
    const r = await fetch(`${API}?action=login&key=${API_KEY}&password=${encodeURIComponent(pw)}`);
    const data = await r.json();
    if(data.ok && data.token){
      S.token = data.token;
      localStorage.setItem("ex_token", data.token);
      localStorage.setItem("ex_token_exp", String(data.expires || 0));
      document.getElementById("loginScreen").classList.remove("show");
      bootstrap();
    } else {
      throw new Error(data.error || "รหัสผ่านไม่ถูกต้อง");
    }
  } catch(e) {
    err.textContent = e.message.includes("Failed") ? "เชื่อมต่อไม่ได้ — กำลังลองรหัสที่จำไว้" : e.message;
    err.classList.add("show");
    card.classList.add("shake"); setTimeout(()=>card.classList.remove("shake"), 300);
    // Fallback: ตรวจ password แบบ legacy ถ้า backend ยังไม่ได้ deploy
    if(pw === "+Exion1234"){
      err.textContent = "เข้าสู่ระบบแบบ offline (กรุณา deploy Apps Script ใหม่)";
      S.token = "legacy";
      localStorage.setItem("ex_token","legacy");
      setTimeout(()=>{
        document.getElementById("loginScreen").classList.remove("show");
        bootstrap();
      }, 800);
    }
  } finally {
    btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
  }
}
function doLogout(){
  if(!confirm("ต้องการออกจากระบบ?\nข้อมูลที่ cache ไว้จะถูกลบทั้งหมด")) return;
  localStorage.removeItem("ex_token");
  localStorage.removeItem("ex_token_exp");
  localStorage.removeItem("ex_db");
  localStorage.removeItem("ex_po");
  localStorage.removeItem("ex_up");
  location.reload();
}
function checkAuth(){
  const t = localStorage.getItem("ex_token");
  const exp = parseInt(localStorage.getItem("ex_token_exp") || "0");
  if(!t) return false;
  if(t === "legacy") { S.token = t; return true; }
  if(exp && Date.now() > exp) { localStorage.removeItem("ex_token"); return false; }
  S.token = t; return true;
}
document.getElementById("pwInput").addEventListener("keydown", e => {
  if(e.key === "Enter") doLogin();
});

async function gsheet(name){
  // พยายามใช้ endpoint ใหม่ (มี token) ถ้าพลาดค่อย fallback
  const url = S.token && S.token !== "legacy"
    ? `${API}?action=sheet&sheet=${encodeURIComponent(name)}&key=${API_KEY}&token=${encodeURIComponent(S.token)}`
    : `${API}?sheet=${encodeURIComponent(name)}&key=${API_KEY}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const data = await r.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

function prog(p, msg){
  document.getElementById("ldFill").style.width = p + "%";
  document.getElementById("ldStatus").textContent = msg;
}

async function loadAll(){
  document.getElementById("syncBtn").classList.add("spin");
  prog(5, "Loading Database...");
  try {
    S.DB = (await gsheet("Database")).filter(r => r["Company"] || r["Product"]);
    prog(18, "Database loaded");
    const res = await Promise.allSettled(YEARS.map((y,i) =>
      gsheet(y).then(rows => {
        prog(18 + ((i+1) / YEARS.length * 76), "Loading PO " + y + "...");
        return rows.map(r => ({ ...r, Year: y }));
      })
    ));
    S.PO = [];
    res.forEach(r => {
      if(r.status === "fulfilled") S.PO.push(...r.value.filter(x => x["Customer"] || x["PO No."] || x["ป"]));
    });
    S.PO = S.PO.map(r => {
      if(r["ป"] && !r["PO No."]){ r["PO No."] = r["ป"]; delete r["ป"]; }
      return r;
    });
    prog(100, "Complete");
    buildSearchIndex();
    computeLatestYear();
    const now = new Date().toLocaleString("th-TH");
    localStorage.setItem("ex_db", JSON.stringify(S.DB));
    localStorage.setItem("ex_po", JSON.stringify(S.PO));
    localStorage.setItem("ex_up", now);
    document.getElementById("syncTime").textContent = "อัปเดตล่าสุด: " + now;
    setOffline(false);
    setTimeout(hideLd, 500);
    doSearch();
    if(S.tab === "home") renderHome(); // update stats on home
  } catch(e) {
    console.error(e);
    fromCache("Sync failed: " + e.message);
  }
  document.getElementById("syncBtn").classList.remove("spin");
}

function fromCache(msg){
  try {
    const d = localStorage.getItem("ex_db");

// Search Index — Pre-compute for speed (5-10x faster)
// ═══════════════════════════════════════════════════════════════
function buildSearchIndex(){
  const idx = r => {
    r._search = Object.values(r)
      .filter(v => v !== null && v !== undefined && typeof v !== "object")
      .join("|").toLowerCase();
  };
  S.DB.forEach(idx);
  S.PO.forEach(r => { idx(r); r._enriched = false; }); // clear enrichment cache
  _dbIdx = null; // force rebuild
}

// ═══════════════════════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════════════════════
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(s){
  if(!s) return s;
  const str = String(s);
  if(str.includes('T')) return str.split('T')[0];
  return str;
}
function parseDate(s){
  if(!s) return null;
  const str = String(s);
  if(str.includes('T')){ const d = new Date(str); return isNaN(d) ? null : d; }
  // Try parse DD/MM/YYYY or YYYY-MM-DD
  const m1 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m1) return new Date(parseInt(m1[3]), parseInt(m1[2])-1, parseInt(m1[1]));
  const m2 = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m2) return new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3]));
  const d = new Date(str); return isNaN(d) ? null : d;
}
function low(s){ return String(s||"").toLowerCase(); }

function matchQ(row, q){
  if(!q) return true;
  const c = row._search || Object.values(row).join("|").toLowerCase();
  return q.split(" ").filter(Boolean).every(t => c.includes(t));
}

function applyFil(data){
  let d = [...data];
  if(S.tab !== "po" && S.tab !== "all" && S.tab !== "latest") return d;
  if(S.fil.status.length) d = d.filter(r => {
    const n = low(r["Status"]);
    return S.fil.status.some(s => {
      const sl = low(s);
      if(sl === "shipped") return n.includes("ship") && !n.includes("late");
      if(sl === "ship late") return n.includes("late");
      return n.includes(sl);
    });
  });
  if(S.fil.year.length) d = d.filter(r => S.fil.year.includes(r["Year"]));
  if(S.fil.supplier.length) d = d.filter(r => S.fil.supplier.includes(r["Supplier"]));
  if(S.fil.sales.length) d = d.filter(r => S.fil.sales.includes(r["Sales"]));
  if(S.fil.customer.length) d = d.filter(r => S.fil.customer.includes(r["Customer"]));
  return d;
}

function applySort(data, type){
  if(!S.sort.field) return data;
  const f = S.sort.field;
  const dir = S.sort.dir === "asc" ? 1 : -1;
  const d = [...data];
  d.sort((a,b) => {
    let va = a[f], vb = b[f];
    if(f === "Customer Due" || f === "Factory Due " || f === "Actual "){
      va = parseDate(va); vb = parseDate(vb);
      if(!va && !vb) return 0;
      if(!va) return 1;
      if(!vb) return -1;
      return (va - vb) * dir;
    }
    if(f === "Year"){
      return ((parseInt(va)||0) - (parseInt(vb)||0)) * dir;
    }
    return String(va||"").localeCompare(String(vb||"")) * dir;
  });
  return d;
}

function computeLatestYear(){
  // หาปีล่าสุดที่มีข้อมูลจริง (แปลงเป็น number เพื่อเรียงถูก)
  const yearNums = S.PO
    .map(r => parseInt(String(r["Year"] || "").trim(), 10))
    .filter(n => !isNaN(n) && n > 1900 && n < 3000);
  if(!yearNums.length){
    S.latestYear = String(new Date().getFullYear());
    return;
  }
  const maxYear = Math.max(...yearNums);
  S.latestYear = String(maxYear);
}

function doSearch(){
  S.q = low(document.getElementById("searchInput").value.trim());
  document.getElementById("xBtn").classList.toggle("show", !!S.q);
  S.fDB = S.DB.filter(r => matchQ(r, S.q));
  // สำหรับ tab latest — กรองแค่ PO ปีล่าสุด
  const poSource = S.tab === "latest"
    ? S.PO.filter(r => r["Year"] === S.latestYear)
    : S.PO;
  S.fPO = applySort(applyFil(poSource.filter(r => matchQ(r, S.q))), "po");
  S.shown = BATCH;
  document.getElementById("cnt-db").textContent = S.fDB.length.toLocaleString();
  document.getElementById("cnt-po").textContent = (S.tab === "latest"
    ? S.PO.filter(r => matchQ(r, S.q)).length
    : S.fPO.length).toLocaleString();
  const latestCount = S.PO.filter(r => r["Year"] === S.latestYear && matchQ(r, S.q)).length;
  const latestEl = document.getElementById("cnt-latest");
  if(latestEl) latestEl.textContent = latestCount.toLocaleString();
  const allPoCount = S.PO.filter(r => matchQ(r, S.q)).length;
  document.getElementById("cnt-all").textContent = (S.fDB.length + allPoCount).toLocaleString();
  renderBar(); render();
}

function clearSearch(){
  document.getElementById("searchInput").value = "";
  doSearch();
}

function switchTab(t){

  ["home","all","db","po","latest","dash"].forEach(x => {
    const tabEl = document.getElementById("tab-" + x);
    const navEl = document.getElementById("nav-" + x);

    if(navEl) navEl.classList.toggle("on", x === t);

function uniqueVals(key, from){

  } else {

}

// ═══════════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════════
function hl(text, q){
  if(!q || !text) return esc(text);
  let r = esc(String(text));
  q.split(" ").filter(Boolean).forEach(t => {
    const lo = r.toLowerCase();
    let out = "", i = 0;
    while(i < r.length){
      const j = lo.indexOf(t, i);
      if(j < 0){ out += r.slice(i); break; }
      out += r.slice(i, j) + "<mark>" + r.slice(j, j + t.length) + "</mark>";
      i = j + t.length;
    }
    r = out;
  });
  return r;
}

function bc(s){
  const n = low(s);
  return n.includes("ship") && !n.includes("late") ? "b-ok" : n.includes("late") ? "b-late" : "b-other";
}

// ═══════════════════════════════════════════════════════════════
// PO Status Badge — 3 รูปแบบตามสถานะ
//   Shipped (ส่งแล้ว)      → badge เขียว "SHIPPED"
//   Ship Late (ส่งช้า)      → badge ส้ม "LATE · <Due Date> · +N วัน"
//   ยังไม่ส่ง / pending    → badge น้ำเงิน "DUE · <Due Date>" (หรือแดงถ้าเลยกำหนดแล้ว)
// ═══════════════════════════════════════════════════════════════
function poBadge(row){
  const status = row["Status"] || "";
  const n = low(status);
  const due = parseDate(row["Customer Due"]);
  const actual = parseDate(row["Actual "]);

  // Case 1: Shipped (ไม่ Late)
  if(n.includes("ship") && !n.includes("late")){
    return `<span class="bdg b-ok">Shipped</span>`;
  }

  // Case 2: Ship Late — แสดง Due Date + จำนวนวันที่ล่าช้า
  if(n.includes("late")){
    let days = null;
    if(due && actual){
      days = Math.floor((actual - due) / (1000*60*60*24));
    }
    const dueStr = due ? due.toLocaleDateString("th-TH", { day:"2-digit", month:"2-digit", year:"2-digit" }) : fmtDate(row["Customer Due"]) || "—";
    return `<span class="bdg-date b-late">
      <span class="bdg-date-top">Ship Late</span>
      <span class="bdg-date-main">${dueStr}</span>
      ${days !== null && days > 0 ? `<span class="bdg-date-sub">+${days} วัน</span>` : ""}
    </span>`;
  }

  // Case 3: ยังไม่ส่ง — แสดง Due Date
  if(due){
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.floor((due - today) / (1000*60*60*24));
    const dueStr = due.toLocaleDateString("th-TH", { day:"2-digit", month:"2-digit", year:"2-digit" });
    if(diff < 0){
      return `<span class="bdg-date b-overdue">
        <span class="bdg-date-top">Overdue</span>
        <span class="bdg-date-main">${dueStr}</span>
        <span class="bdg-date-sub">เลย ${Math.abs(diff)} วัน</span>
      </span>`;
    }
    return `<span class="bdg-date b-due">
      <span class="bdg-date-top">Due</span>
      <span class="bdg-date-main">${dueStr}</span>
      ${diff <= 30 ? `<span class="bdg-date-sub">อีก ${diff} วัน</span>` : ""}
    </span>`;
  }

  // Fallback: มี status อื่น ที่ไม่ใช่ shipped/late และไม่มี due date
  if(status){
    return `<span class="bdg ${bc(status)}">${esc(status)}</span>`;
  }
  return "";
}

// Normalize key: lowercase, strip spaces/dots/dashes/underscores/slashes
function normKey(s){ return String(s||"").toLowerCase().replace(/[\s._\-\/]+/g,""); }
// Normalize value: strip spaces/dashes/dots (keep digits/letters)
function normVal(s){ return String(s||"").toLowerCase().replace(/[\s\-._/]+/g,"").trim(); }

// Build DB indices once per data load for fast lookup
let _dbIdx = null;
function buildDBIndex(){
  _dbIdx = { byExion: new Map(), byCust: new Map() };
  if(!S.DB.length) return;
  // Detect actual column names from first row
  const sample = S.DB[0];
  const keys = Object.keys(sample);
  const exionKey = keys.find(k => {
    const n = normKey(k);
    return n === "exionpo" || n === "exionpono" || n === "pono" || n.includes("exion") && n.includes("po");
  });
  const custKey = keys.find(k => {
    const n = normKey(k);
    return n === "custrefpo" || n === "customerpo" || n === "custpo" || (n.includes("cust") && n.includes("po"));
  });
  const modelKey = keys.find(k => normKey(k) === "model");
  const snKey = keys.find(k => { const n = normKey(k); return n === "sn" || n === "serial" || n === "serialnumber" || n === "serialno"; });
  _dbIdx.exionKey = exionKey;
  _dbIdx.custKey = custKey;
  _dbIdx.modelKey = modelKey;
  _dbIdx.snKey = snKey;
  // Populate indices
  S.DB.forEach(d => {
    if(exionKey){
      const v = normVal(d[exionKey]);
      if(v){
        if(!_dbIdx.byExion.has(v)) _dbIdx.byExion.set(v, []);
        _dbIdx.byExion.get(v).push(d);
      }
    }
    if(custKey){
      const v = normVal(d[custKey]);
      if(v){
        if(!_dbIdx.byCust.has(v)) _dbIdx.byCust.set(v, []);
        _dbIdx.byCust.get(v).push(d);
      }
    }
  });
}

// Enrich PO row with Model/SN from DB — flexible matching
function enrichPO(po){
  if(po._enriched) return po; // cached
  po._model = ""; po._sn = ""; po._enriched = true;
  if(!_dbIdx) buildDBIndex();
  if(!_dbIdx || !S.DB.length) return po;

  // Collect all possible PO number fields (whatever they're called)
  const poKeys = Object.keys(po);
  const poExionCandidates = poKeys.filter(k => {
    const n = normKey(k);
    return n === "pono" || n === "exionpo" || n === "exionpono" || (n.includes("exion") && n.includes("po"));
  });
  const poCustCandidates = poKeys.filter(k => {
    const n = normKey(k);
    return n === "customerpo" || n === "custpo" || n === "custrefpo" || (n.includes("cust") && n.includes("po"));
  });

  let match = null;

  // Try Exion PO match first
  for(const k of poExionCandidates){
    const v = normVal(po[k]);
    if(v && _dbIdx.byExion.has(v)){
      match = _dbIdx.byExion.get(v)[0];
      break;
    }
  }
  // Fallback: Customer PO match
  if(!match){
    for(const k of poCustCandidates){
      const v = normVal(po[k]);
      if(v && _dbIdx.byCust.has(v)){
        match = _dbIdx.byCust.get(v)[0];
        break;
      }
    }
  }
  // Additional fallback: cross-match (PO's Exion → DB's Cust, and vice versa)
  if(!match){
    for(const k of poExionCandidates){
      const v = normVal(po[k]);
      if(v && _dbIdx.byCust.has(v)){
        match = _dbIdx.byCust.get(v)[0];
        break;
      }
    }
  }
  if(!match){
    for(const k of poCustCandidates){
      const v = normVal(po[k]);
      if(v && _dbIdx.byExion.has(v)){
        match = _dbIdx.byExion.get(v)[0];
        break;
      }
    }
  }

  if(match){
    po._model = (_dbIdx.modelKey && match[_dbIdx.modelKey]) || "";
    po._sn = (_dbIdx.snKey && match[_dbIdx.snKey]) || "";
  }
  return po;
}

// Product Chips (S/N, Model) — ใช้ทั้ง Product & PO card
function productChips(row, showAll){
  // Find model/SN using flexible key detection
  const keys = Object.keys(row);
  const modelKey = keys.find(k => normKey(k) === "model");
  const snKey = keys.find(k => { const n = normKey(k); return n === "sn" || n === "serial" || n === "serialnumber" || n === "serialno"; });
  const model = (modelKey ? row[modelKey] : "") || row._model || "";
  const sn = (snKey ? row[snKey] : "") || row._sn || "";
  let chips = [];
  if(model){
    chips.push(`<span class="pchip"><span class="pchip-label">MODEL</span><span class="pchip-value">${hl(String(model), S.q)}</span></span>`);
  }
  if(sn){
    chips.push(`<span class="pchip"><span class="pchip-label">S/N</span><span class="pchip-value">${hl(String(sn), S.q)}</span></span>`);
  }
  if(!chips.length) return "";
  return `<div class="pchip-row">${chips.join("")}</div>`;
}

function mkK(v, l){ return `<div class="kpi"><div class="kpi-v">${Number(v).toLocaleString()}</div><div class="kpi-l">${l}</div></div>`; }
function mkKc(v, l, c){ return `<div class="kpi" style="border-left-color:${c}"><div class="kpi-v" style="color:${c}">${Number(v).toLocaleString()}</div><div class="kpi-l">${l}</div></div>`; }
function cr(l, v){ return `<div class="cr"><span class="cl">${l}</span><span class="cv">${v}</span></div>`; }
function crs(l, v){ return `<div class="cr"><span class="cl">${l}</span><span class="cv s">${v}</span></div>`; }

// Export CSV
// ═══════════════════════════════════════════════════════════════
function toCSV(rows){
  if(!rows.length) return "";
  // Always skip internal fields starting with _
  const headers = [...new Set(rows.flatMap(r => Object.keys(r).filter(k => !k.startsWith("_"))))];
  const esc = v => {
    if(v === null || v === undefined) return "";
    let s = String(v); if(s.includes('T') && !isNaN(new Date(s))) s = fmtDate(s);
    if(s.includes(",") || s.includes('"') || s.includes("\n")) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  return headers.join(",") + "\n" + rows.map(r => headers.map(h => esc(r[h])).join(",")).join("\n");
}

function downloadCSV(filename, csv){
  const bom = "\uFEFF"; // UTF-8 BOM for Excel compatibility
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function exportResults(){
  const data = S.tab === "db" ? S.fDB : S.tab === "po" ? S.fPO
    : [...S.fDB, ...S.fPO];
  if(!data.length){ toast("ไม่มีข้อมูลให้ export"); return; }
  const stamp = new Date().toISOString().slice(0,10);
  const name = `exion_${S.tab}_${stamp}.csv`;
  downloadCSV(name, toCSV(data));
  toast(`Export สำเร็จ: ${data.length} รายการ`);
}

function exportAll(){
  const stamp = new Date().toISOString().slice(0,10);
  downloadCSV(`exion_database_${stamp}.csv`, toCSV(S.DB));
  setTimeout(() => downloadCSV(`exion_po_${stamp}.csv`, toCSV(S.PO)), 500);
  toast(`Export ${S.DB.length} + ${S.PO.length} รายการ`);
  closeSettings();
}

function openSettings(){
  document.getElementById("setFo").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeSettings(){
  document.getElementById("setFo").classList.remove("show");
  document.body.style.overflow = "";
}
function clearCache(){
  if(!confirm("ล้าง cache และ sync ใหม่?")) return;
  localStorage.removeItem("ex_db");
  localStorage.removeItem("ex_po");
  localStorage.removeItem("ex_up");
  closeSettings();
  loadAll();
}

// ═══════════════════════════════════════════════════════════════
// Pull-to-refresh
// ═══════════════════════════════════════════════════════════════
(function initPTR(){
  let startY = 0, pulling = false, pulled = 0;
  const THRESHOLD = 70;
  document.addEventListener("touchstart", e => {
    if(window.scrollY > 0) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });
  document.addEventListener("touchmove", e => {
    if(!pulling) return;
    pulled = e.touches[0].clientY - startY;
    if(pulled > 20 && window.scrollY === 0){
      document.getElementById("ptr").classList.add("show");
    }
  }, { passive: true });
  document.addEventListener("touchend", () => {
    if(pulling && pulled > THRESHOLD && window.scrollY === 0 && !document.getElementById("syncBtn").classList.contains("spin")){
      loadAll();
    }
    setTimeout(() => document.getElementById("ptr").classList.remove("show"), 300);
    pulling = false; pulled = 0;
  }, { passive: true });
})();

// Bootstrap
// ═══════════════════════════════════════════════════════════════
function bootstrap(){
  // Try to use cached data first for fast startup
  const cc = localStorage.getItem("ex_db");
  if(cc){
    try {
      S.DB = JSON.parse(cc);
      S.PO = JSON.parse(localStorage.getItem("ex_po") || "[]");
      buildSearchIndex();
      computeLatestYear();
      const u = localStorage.getItem("ex_up");
      if(u) document.getElementById("syncTime").textContent = "Cache: " + u;
      hideLd();
      doSearch();
      switchTab("home"); // แสดง Home เป็นหน้าแรก
    } catch(e) {}
  }
  loadAll();
}

if(!checkAuth()){
  document.getElementById("loginScreen").classList.add("show");
  document.getElementById("loading").style.display = "none";
} else {
  bootstrap();
}
